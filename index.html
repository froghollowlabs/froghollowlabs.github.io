<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frog Hollow Labs</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #24292e;
            background: #f6f8fa;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 60px auto;
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        h1 { font-size: 2.5em; margin-bottom: 20px; color: #1a1a1a; }
        p { margin-bottom: 20px; color: #586069; font-size: 1.1em; }
        ul { list-style: none; margin-top: 30px; }
        ul li { margin-bottom: 12px; }
        ul li a {
            color: #0366d6;
            text-decoration: none;
            font-size: 1.1em;
            padding: 8px 0;
            display: inline-block;
        }
        ul li a:hover { text-decoration: underline; }
        footer {
            margin-top: 60px;
            padding-top: 20px;
            border-top: 1px solid #e1e4e8;
            text-align: center;
            color: #6a737d;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Frog Hollow Labs</h1>
        <p>Building apps and businesses. Based in Minneapolis, MN.</p>
        
        <ul>
            <li><a href="/privacy">Privacy Policy</a></li>
            <li><a href="/terms">Terms of Service</a></li>
        </ul>

        <footer>
            © 2026 Frog Hollow Labs
        </footer>
    </div>
</body>
</html>
